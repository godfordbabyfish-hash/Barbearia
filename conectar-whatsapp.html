<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Conectar WhatsApp - Evolution API</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: #020617;
      border-radius: 16px;
      padding: 24px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      border: 1px solid #1f2937;
    }
    h1 {
      font-size: 1.25rem;
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 0.8rem;
      margin-bottom: 4px;
      color: #9ca3af;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #374151;
      background: #020617;
      color: #e5e7eb;
      font-size: 0.9rem;
      box-sizing: border-box;
      margin-bottom: 10px;
    }
    button {
      width: 100%;
      padding: 10px 12px;
      border-radius: 999px;
      border: none;
      background: #22c55e;
      color: #022c22;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
    }
    button:disabled {
      opacity: 0.5;
      cursor: default;
    }
    .small {
      font-size: 0.75rem;
      color: #9ca3af;
      margin-top: 6px;
    }
    .status {
      font-size: 0.8rem;
      margin-top: 10px;
      min-height: 1.2rem;
    }
    .status.ok { color: #4ade80; }
    .status.err { color: #f97373; }
    .qr {
      margin-top: 16px;
      text-align: center;
    }
    .qr img {
      max-width: 260px;
      border-radius: 8px;
      background: #fff;
      padding: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Conectar WhatsApp (Evolution API)</h1>
    <p class="small">
      Use esta tela apenas para vincular o número de WhatsApp à instância. As demais funções já são automáticas pelo sistema.
    </p>
    <div style="margin-top: 12px;">
      <label for="baseUrl">EVOLUTION_API_URL</label>
      <input id="baseUrl" placeholder="https://seu-dominio-da-evolution.com" />

      <label for="apiKey">EVOLUTION_API_KEY</label>
      <input id="apiKey" placeholder="apikey da Evolution" />

      <label for="instanceName">Nome da instância</label>
      <input id="instanceName" value="instance-1" />

      <button id="btnConnect">Gerar / Atualizar QR Code</button>
      <div class="status" id="status"></div>
    </div>

    <div class="qr" id="qrContainer" style="display:none;">
      <p class="small">Leia este QR Code com o WhatsApp do número de envio.</p>
      <img id="qrImage" alt="QR Code WhatsApp" />
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    async function createInstance(baseUrl, apiKey, instanceName) {
      const res = await fetch(baseUrl.replace(/\/+$/, '') + '/instance/create', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': apiKey,
        },
        body: JSON.stringify({
          instanceName,
          token: 'token-' + instanceName + '-' + Date.now(),
          qrcode: true,
        }),
      });

      if (!res.ok && res.status !== 409) {
        const txt = await res.text().catch(() => '');
        throw new Error('Erro ao criar instância: HTTP ' + res.status + ' ' + txt);
      }
    }

    async function fetchQRCode(baseUrl, apiKey, instanceName) {
      const res = await fetch(baseUrl.replace(/\/+$/, '') + '/instance/connect/' + encodeURIComponent(instanceName), {
        method: 'GET',
        headers: { 'apikey': apiKey },
      });

      if (!res.ok) {
        const txt = await res.text().catch(() => '');
        throw new Error('Erro ao obter QR: HTTP ' + res.status + ' ' + txt);
      }

      const data = await res.json().catch(() => ({}));

      // Tentar achar base64 em vários formatos
      let base64 =
        data?.qrcode?.base64 ||
        data?.qrcode_base64 ||
        data?.base64 ||
        data?.instance?.qrcode_base64 ||
        (typeof data?.qrcode === 'string' ? data.qrcode : null);

      if (!base64) {
        console.log('Resposta connect:', data);
        throw new Error('QR code não encontrado na resposta. Veja console para detalhes.');
      }

      if (!base64.startsWith('data:image')) {
        base64 = 'data:image/png;base64,' + base64;
      }

      return base64;
    }

    $('btnConnect').addEventListener('click', async () => {
      const baseUrl = $('baseUrl').value.trim();
      const apiKey = $('apiKey').value.trim();
      const instanceName = $('instanceName').value.trim();
      const status = $('status');
      const btn = $('btnConnect');
      const qrContainer = $('qrContainer');
      const qrImage = $('qrImage');

      status.className = 'status';
      status.textContent = '';
      qrContainer.style.display = 'none';

      if (!baseUrl || !apiKey || !instanceName) {
        status.classList.add('err');
        status.textContent = 'Preencha URL, API KEY e nome da instância.';
        return;
      }

      btn.disabled = true;
      status.textContent = 'Criando/verificando instância...';

      try {
        await createInstance(baseUrl, apiKey, instanceName);
        status.textContent = 'Instância pronta. Buscando QR Code...';

        const base64 = await fetchQRCode(baseUrl, apiKey, instanceName);

        qrImage.src = base64;
        qrContainer.style.display = 'block';
        status.classList.add('ok');
        status.textContent = 'QR Code carregado com sucesso. Escaneie com o WhatsApp.';
      } catch (err) {
        console.error(err);
        status.classList.add('err');
        status.textContent = err.message || 'Erro ao conectar à Evolution API.';
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
